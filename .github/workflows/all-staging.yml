      - name: Trigger pdf-staging
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: pdf-staging.yml
          token: ${{ secrets.REPO_TOKEN }}

      - name: Trigger slides-staging
        uses: benc-uk/workflow-dispatch@v1
